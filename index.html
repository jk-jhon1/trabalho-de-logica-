<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BiblioTech - Livraria & Biblioteca</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col relative overflow-x-hidden">

    <nav class="bg-indigo-600 text-white shadow-md sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="#" class="text-2xl font-bold flex items-center gap-2">
                <i class="fas fa-book-open"></i> BiblioTech
            </a>
            <div class="flex items-center gap-6">
                <a href="#acervo" class="hover:text-indigo-200 transition hidden sm:inline">Acervo</a>
                
                <button onclick="abrirCarrinho()" class="relative bg-indigo-700 hover:bg-indigo-800 px-4 py-2 rounded-xl transition flex items-center gap-2 shadow-inner cursor-pointer">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="hidden sm:inline font-medium">Meu Carrinho</span>
                    <span id="cart-count" class="bg-amber-500 text-gray-900 text-xs font-bold w-5 h-5 flex items-center justify-center rounded-full">0</span>
                </button>
            </div>
        </div>
    </nav>

    <header class="bg-gradient-to-r from-indigo-500 to-purple-600 text-white py-20 text-center px-4">
        <h1 class="text-4xl md:text-5xl font-extrabold mb-4">Sua Próxima Leitura Está Aqui</h1>
        <p class="text-xl max-w-2xl mx-auto opacity-90">Adicione livros ao seu carrinho e simule sua compra de forma rápida e prática.</p>
        
        <div class="mt-8 max-w-md mx-auto relative">
            <input type="text" id="search-input" placeholder="Busque por título, autor ou gênero..." class="w-full px-5 py-3 rounded-full text-gray-800 shadow-lg focus:outline-none focus:ring-2 focus:ring-indigo-400">
            <button class="absolute right-3 top-3 text-indigo-600">
                <i class="fas fa-search text-xl"></i>
            </button>
        </div>
    </header>

    <main id="acervo" class="max-w-6xl mx-auto px-4 py-12 flex-grow w-full">
        <h2 class="text-3xl font-bold mb-8 text-center text-gray-900">Nosso Catálogo</h2>
        
        <div id="livros-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <div id="carrinho-fundo" class="fixed inset-0 bg-black/50 z-50 hidden opacity-0 transition-opacity duration-300" onclick="fecharCarrinho()"></div>
    <div id="carrinho-lateral" class="fixed inset-y-0 right-0 max-w-md w-full bg-white shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col">
        <div class="p-4 bg-indigo-600 text-white flex justify-between items-center shadow-md">
            <h3 class="text-lg font-bold flex items-center gap-2"><i class="fas fa-shopping-cart"></i> Seu Carrinho</h3>
            <button onclick="fecharCarrinho()" class="text-white hover:text-indigo-200 text-xl p-1 cursor-pointer">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <div id="carrinho-itens" class="p-4 flex-grow overflow-y-auto space-y-4">
            </div>
        <div class="p-4 border-t border-gray-100 bg-gray-50 shadow-inner">
            <div class="flex justify-between items-center mb-4">
                <span class="font-semibold text-gray-600">Valor Total:</span>
                <span id="carrinho-total" class="text-2xl font-black text-indigo-600">R$ 0,00</span>
            </div>
            <button onclick="finalizarCompra()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition shadow-md flex items-center justify-center gap-2 cursor-pointer">
                <i class="fas fa-check-circle"></i> Finalizar Compra (Simulação)
            </button>
        </div>
    </div>

    <div id="modal-detalhes" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 hidden opacity-0 transition-opacity duration-300" onclick="fecharModalExterno(event)">
        <div class="bg-white rounded-2xl max-w-2xl w-full max-h-[90vh] overflow-y-auto shadow-2xl relative transform scale-95 transition-transform duration-300">
            <button onclick="fecharModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600 p-2 text-xl z-10 cursor-pointer">
                <i class="fas fa-times"></i>
            </button>
            <div id="modal-conteudo"></div>
        </div>
    </div>

    <footer class="bg-gray-900 text-gray-300 py-8 border-t border-gray-800 mt-auto">
        <div class="text-center text-sm text-gray-500">
            &copy; 2026 BiblioTech Store. Simulação de e-commerce educacional.
        </div>
    </footer>

    <script src="livros.js"></script>
</body>
</html>
