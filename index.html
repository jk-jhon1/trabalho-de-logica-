<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Livraria Para Baicho - Livraria Online</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-100 font-sans min-h-screen">

    <header class="bg-blue-600 text-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4 flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold tracking-wide">📚 Livraria Para baicho</h1>
            
            <div class="w-full md:w-1/2 flex">
                <input type="text" id="busca-input" placeholder="Pesquise por título, autor ou gênero..." 
                       class="w-full p-2 rounded-l text-gray-800 focus:outline-none bg-white">
                <button onclick="filtrarLivros()" class="bg-blue-800 hover:bg-blue-900 px-6 rounded-r font-semibold transition">
                    Buscar
                </button>
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 py-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-2">
            <h2 class="text-2xl font-bold text-gray-800 mb-6">Catálogo de Livros</h2>
            <div id="vitrine-livros" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                </div>
        </div>

        <div class="space-y-6">
            
            <div class="bg-white p-6 rounded-lg shadow-md">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    🛒 Seu Carrinho
                </h2>
                <div id="itens-carrinho" class="space-y-3 divide-y divide-gray-100 max-h-60 overflow-y-auto mb-4">
                    <p class="text-gray-500 text-sm py-2">O seu carrinho está vazio.</p>
                </div>
                <div class="border-t border-gray-200 pt-4">
                    <div class="flex justify-between font-semibold text-gray-700">
                        <span>Subtotal dos Livros:</span>
                        <span id="subtotal-carrinho">R$ 0,00</span>
                    </div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-md border border-gray-200">
                <h2 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                    🚚 Dados de Entrega
                </h2>
                <p class="text-xs text-gray-500 mb-4">
                    Sede em: Rua Maria Sobania, 309 - Tindiquera. Taxa: R$ 0,30 por KM.
                </p>
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Rua:</label>
                        <input type="text" id="input-rua" placeholder="Ex: Av. das Nações" 
                               class="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Número:</label>
                        <input type="text" id="input-numero" placeholder="Ex: 1520" 
                               class="w-full p-2 border border-gray-300 rounded text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-gray-600 uppercase mb-1">Bairro:</label>
                        <select id="input-bairro" class="w-full p-2 border border-gray-300 rounded text-sm bg-white focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option value="">Selecione o seu bairro...</option>
                            <option value="Tindiquera">Tindiquera (Próximo à Sede)</option>
                            <option value="Centro">Centro</option>
                            <option value="Fazenda Velha">Fazenda Velha</option>
                            <option value="Estacao">Estação</option>
                            <option value="Costeira">Costeira</option>
                            <option value="Iguacu">Iguaçu</option>
                            <option value="Capela Velha">Capela Velha</option>
                            <option value="Cachoeira">Cachoeira</option>
                        </select>
                    </div>

                    <button onclick="calcularFreteEAtualizar()" 
                            class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded text-sm transition cursor-pointer shadow">
                        Calcular Frete e Totais
                    </button>
                </div>

                <div id="resumo-frete" class="mt-5 p-4 bg-blue-50 rounded-lg border border-blue-100 hidden space-y-2 animate-fade-in">
                    <div class="flex justify-between text-sm text-gray-700">
                        <span>Distância da Sede:</span>
                        <span id="txt-distancia" class="font-bold">0.00 KM</span>
                    </div>
                    <div class="flex justify-between text-sm text-gray-700">
                        <span>Taxa de Entrega:</span>
                        <span id="txt-valor-frete" class="font-bold text-green-700">R$ 0,00</span>
                    </div>
                    <div class="border-t border-blue-200 pt-2 mt-2 flex justify-between items-center">
                        <span class="font-bold text-gray-800">Valor Total Geral:</span>
                        <span id="txt-total-geral" class="text-xl font-black text-blue-700">R$ 0,00</span>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="livros.js"></script>
</body>
</html>
